<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Service Area — Capps-Batavia Fire Department</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; }
    #site-header, #alert-banner { flex-shrink: 0; }
    .page-hero-sm { flex-shrink: 0; }
    .map-legend { flex-shrink: 0; }
    #map-container { flex: 1; min-height: 300px; }
    #map { width: 100%; height: 100%; }
    #map-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,31,46,0.85);
      color: #e8eaf0; font-size: 1rem; z-index: 500;
      flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #374151;
      border-top-color: #cc2200;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header id="site-header"></header>
<div id="alert-banner"></div>
<div class="page-hero-sm">
  <h1>Service Area</h1>
</div>

<div class="map-legend">
  <span style="color:#f97316;font-weight:700;">—</span>
  <span>District Boundary</span>
  <span style="margin-left:16px;color:#9ca3af">Capps-Batavia Fire District, Boone County, Arkansas</span>
  <span id="map-stats" style="margin-left:auto;color:#9ca3af"></span>
</div>

<div id="map-container" style="position:relative">
  <div id="map-loading">
    <div class="spinner"></div>
    <span>Loading district map…</span>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="nav.js"></script>
<script>
async function initMap() {
  const data = await fetch('/boundary.json').then(r => r.json());

  const map = L.map('map');

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Imagery © Esri', maxZoom: 19,
  }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19, opacity: 0.4,
  }).addTo(map);

  const layer = L.geoJSON(data, {
    style: { color: '#f97316', weight: 3, fillColor: '#f97316', fillOpacity: 0.08, dashArray: '8 5' },
  }).addTo(map);

  // The map lives in a flex container; make sure Leaflet has measured its
  // final size before fitting, otherwise tiles render into a mis-sized viewport.
  const fit = () => { map.invalidateSize(); map.fitBounds(layer.getBounds(), { padding: [30, 30] }); };
  fit();
  window.addEventListener('resize', fit);

  // Show area + household stats from the saved district data
  const p = data.features[0]?.properties;
  if (p) {
    const fmt = n => Math.round(n).toLocaleString('en-US');
    const parts = [];
    if (p.square_miles) parts.push(`${fmt(p.square_miles)} sq mi`);
    if (p.estimated_households) parts.push(`${fmt(p.estimated_households)} households`);
    if (p.estimated_addresses) parts.push(`${fmt(p.estimated_addresses)} addresses`);
    document.getElementById('map-stats').textContent = parts.join(' · ');
  }

  document.getElementById('map-loading').style.display = 'none';
}

initMap().catch(e => {
  document.getElementById('map-loading').innerHTML = `<p style="color:#fca5a5">Failed to load map: ${e.message}</p>`;
});
</script>
</body>
</html>
