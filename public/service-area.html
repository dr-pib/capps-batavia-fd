<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Service Area — Capps-Batavia Fire Department</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; }
    #site-header, #alert-banner { flex-shrink: 0; }
    .page-hero-sm { flex-shrink: 0; }
    .map-legend { flex-shrink: 0; }
    #map-container { flex: 1; min-height: 300px; }
    #map { width: 100%; height: 100%; }
    #map-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,31,46,0.85);
      color: #e8eaf0; font-size: 1rem; z-index: 500;
      flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #374151;
      border-top-color: #cc2200;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Community labels */
    .leaflet-tooltip.community-tip {
      background: transparent; border: none; box-shadow: none; padding: 0;
      color: #fff; white-space: nowrap;
      font: 600 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-shadow: 0 0 3px rgba(0,0,0,0.95), 0 1px 2px rgba(0,0,0,0.95);
    }
    .leaflet-tooltip.community-tip::before { display: none; } /* hide pointer arrow */
  </style>
</head>
<body>

<header id="site-header"></header>
<div id="alert-banner"></div>
<div class="page-hero-sm">
  <h1>Service Area</h1>
</div>

<div class="map-legend">
  <span style="color:#f97316;font-weight:700;">—</span>
  <span>District Boundary</span>
  <span style="margin-left:16px;color:#9ca3af">Capps-Batavia Fire District, Boone County, Arkansas</span>
  <span id="map-stats" style="margin-left:auto;color:#9ca3af"></span>
</div>

<div id="map-container" style="position:relative">
  <div id="map-loading">
    <div class="spinner"></div>
    <span>Loading district map…</span>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="nav.js"></script>
<script>
async function initMap() {
  const data = await fetch('/boundary.json').then(r => r.json());

  const map = L.map('map', { maxBoundsViscosity: 1.0 });

  // Satellite imagery base
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Imagery, places &amp; roads © Esri', maxZoom: 19,
  }).addTo(map);

  // Transparent reference overlays: highways/roads, then town & place names
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);

  // Dim everything outside the district: a world-sized polygon with the
  // district cut out as a hole (Leaflet's default even-odd fill makes the hole).
  const districtRings = [];
  data.features.forEach(f => {
    const g = f.geometry;
    if (g.type === 'Polygon') districtRings.push(g.coordinates[0]);
    else if (g.type === 'MultiPolygon') g.coordinates.forEach(poly => districtRings.push(poly[0]));
  });
  const worldRing = [[-180, -85], [180, -85], [180, 85], [-180, 85], [-180, -85]];
  L.geoJSON(
    { type: 'Feature', geometry: { type: 'Polygon', coordinates: [worldRing, ...districtRings] } },
    { interactive: false, style: { stroke: false, fillColor: '#0b1020', fillOpacity: 0.55 } }
  ).addTo(map);

  // District outline, drawn on top of the mask
  const layer = L.geoJSON(data, {
    style: { color: '#f97316', weight: 3, fillColor: '#f97316', fillOpacity: 0, dashArray: '8 5' },
  }).addTo(map);

  // Fit to the district and "crop" the view (lock panning + stop zoom-out at
  // the fitted view). The map lives in a flex container, so we (re)apply this
  // whenever it gets a real size — a ResizeObserver avoids the race where an
  // early fit on a zero-sized container would lock in a bad zoom.
  const bounds = layer.getBounds();
  const applyView = () => {
    map.setMinZoom(0);
    map.setMaxBounds(null);
    map.invalidateSize();
    map.fitBounds(bounds, { padding: [25, 25] });
    map.setMinZoom(map.getZoom());
    map.setMaxBounds(bounds.pad(0.15));
  };
  new ResizeObserver(applyView).observe(document.getElementById('map'));
  applyView();

  // Local community labels (not shown by the basemap's generic place labels).
  // Added after the view is set, since permanent tooltips project immediately.
  const communities = [
    { name: 'Liberty',            lat: 36.3457, lng: -93.2105 },
    { name: 'Prosperity',         lat: 36.3328, lng: -93.2010 },
    { name: 'Ridgeway',           lat: 36.3179, lng: -93.2044 },
    { name: 'Bear Creek Springs', lat: 36.2976, lng: -93.1832, dir: 'left' },
    { name: 'Francis',            lat: 36.2920, lng: -93.1816 },
    { name: 'Little Arkansaw',    lat: 36.2892, lng: -93.2366, dir: 'left' },
    { name: 'Batavia',            lat: 36.2551, lng: -93.2227 },
    { name: 'Capps',              lat: 36.2356, lng: -93.1893 },
    { name: 'Grubb Springs',      lat: 36.2151, lng: -93.1546 },
  ];
  communities.forEach(c => {
    const dir = c.dir || 'right';
    const offset = dir === 'left' ? [-7, 0] : [7, 0];
    L.circleMarker([c.lat, c.lng], {
      radius: 4, color: '#cc2200', weight: 1.5, fillColor: '#fff', fillOpacity: 1, interactive: false,
    }).addTo(map).bindTooltip(c.name, {
      permanent: true, direction: dir, offset, className: 'community-tip', interactive: false,
    });
  });

  // Show area + household stats from the saved district data
  const p = data.features[0]?.properties;
  if (p) {
    const fmt = n => Math.round(n).toLocaleString('en-US');
    const parts = [];
    if (p.square_miles) parts.push(`${fmt(p.square_miles)} sq mi`);
    if (p.estimated_households) parts.push(`${fmt(p.estimated_households)} households`);
    if (p.estimated_addresses) parts.push(`${fmt(p.estimated_addresses)} addresses`);
    document.getElementById('map-stats').textContent = parts.join(' · ');
  }

  document.getElementById('map-loading').style.display = 'none';
}

initMap().catch(e => {
  document.getElementById('map-loading').innerHTML = `<p style="color:#fca5a5">Failed to load map: ${e.message}</p>`;
});
</script>
</body>
</html>
